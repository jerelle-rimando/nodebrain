<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeBrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .screen {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: block;
    }

    /* ── Screen 1: Welcome ── */
    #screen-welcome {
      position: fixed;
      inset: 0;
    }

    #welcome-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* Invisible continue button
       Scan of image: button center is ~46% from top, horizontally centered
       Button is roughly 200px wide, 45px tall at 1280x720 reference */
    #btn-continue {
      position: absolute;
      left: 50%;
      top: 82%;
      transform: translate(-50%, -50%);
      width: 16%;
      height: 7%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* Terms of Service link — bottom left of the "By continuing..." line */
    #btn-tos {
      position: absolute;
      left: 49.7%;
      top: 91%;
      width: 15%;
      height: 4%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
    }

    #btn-tos:hover::after,
    #btn-pp:hover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: #6366f1;
    }

    /* Privacy Policy link */
    #btn-pp {
      position: absolute;
      left: 74.4%;
      top: 91%;
      width: 12%;
      height: 4%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
    }

    /* ── Screen 2: Loading ── */
    #screen-loading {
      position: fixed;
      inset: 0;
      background: #060608;
    }

    #loading-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* Overlay the dynamic text on top of the image */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Hide the static image text area and replace with live text */
    #loading-status-wrap {
      position: absolute;
      /* Align to where "Preparing your workspace..." text sits in the image */
      top: 52%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 400px;
    }

    #loading-title {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: 500;
      color: #e2e8f0;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    #loading-subtitle {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 0.01em;
    }

    #loading-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      margin-top: 4px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      background: #6366f1;
      border-radius: 999px;
      width: 10%;
      transition: width 0.4s ease;
    }

    /* Spinning icon overlay — sits on top of the icon in the loading image */
    #spinner-wrap {
      position: absolute;
      top: 36%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(99,102,241,0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
  </style>
</head>
<body>

  <!-- ── Screen 1: Welcome ── -->
  <div id="screen-welcome" class="screen active">
    <img id="welcome-bg" src="welcome.png" alt="" draggable="false" />

    <!-- Invisible Continue button -->
    <button id="btn-continue" onclick="goToLoading()" title=""></button>

    <!-- Invisible Terms of Service link -->
    <button id="btn-tos" onclick="openLink('https://PLACEHOLDER_WEBSITE_URL/terms')" title="Terms of Service"></button>

    <!-- Invisible Privacy Policy link -->
    <button id="btn-pp" onclick="openLink('https://PLACEHOLDER_WEBSITE_URL/privacy')" title="Privacy Policy"></button>
  </div>

  <!-- ── Screen 2: Loading ── -->
  <div id="screen-loading" class="screen">
    <img id="loading-bg" src="loading.png" alt="" draggable="false" />

    <!-- Live spinner on top of static icon in image -->
    <div id="spinner-wrap">
      <div id="spinner"></div>
    </div>

    <!-- Live text on top of static text in image -->
    <div id="loading-status-wrap">
      <div id="loading-title">Preparing your workspace…</div>
      <div id="loading-subtitle">Initializing backend…</div>
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
    </div>
  </div>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById(id);
      el.classList.add('active');
      el.classList.remove('fade-in');
      void el.offsetWidth;
      el.classList.add('fade-in');
    }

    function openLink(url) {
      // Uses Electron shell to open in default browser
      if (window.electronAPI && window.electronAPI.openExternal) {
        window.electronAPI.openExternal(url);
      } else {
        window.open(url, '_blank');
      }
    }

    function setStatus(subtitle, progress) {
      document.getElementById('loading-subtitle').textContent = subtitle;
      document.getElementById('loading-bar').style.width = progress + '%';
    }

    // ── Flow ──────────────────────────────────────────────────────────────────
    async function goToLoading() {
      showScreen('screen-loading');

      setStatus('Initializing backend…', 15);

      await sleep(600);
      setStatus('Starting services…', 35);

      await sleep(600);
      setStatus('Loading RAG engine…', 55);

      await sleep(600);
      setStatus('Registering tools…', 70);

      await sleep(400);
      setStatus('Almost ready…', 88);

      // Mark setup complete and load the main app
      try {
        await window.electronAPI.completeSetup();
        setStatus('Launching NodeBrain…', 98);
        await sleep(300);
        await window.electronAPI.loadMainApp();
      } catch (err) {
        setStatus('Something went wrong. Please restart.', 0);
        console.error(err);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ── Hover underline effect for link buttons ───────────────────────────────
    ['btn-tos', 'btn-pp'].forEach(id => {
      const btn = document.getElementById(id);
      btn.addEventListener('mouseenter', () => {
        btn.style.borderBottom = '1px solid #6366f1';
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.borderBottom = 'none';
      });
    });
  </script>
</body>
</html>
